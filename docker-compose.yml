services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: promptkeep
      POSTGRES_PASSWORD: promptkeep
      POSTGRES_DB: promptkeep
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptkeep"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DATABASE_URL: postgresql://promptkeep:promptkeep@postgres:5432/promptkeep
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: