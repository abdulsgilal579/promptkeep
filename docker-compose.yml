api:
    image: ghcr.io/abdulsgilal579/promptkeep-api:latest
    build: .
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DATABASE_URL: postgresql://promptkeep:promptkeep@postgres:5432/promptkeep
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy